name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: zeta-matrix-483109-u9
  REGION: europe-west1
  SERVICE: euler-benchmark
  REGISTRY: europe-west1-docker.pkg.dev/zeta-matrix-483109-u9/euler-benchmark

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t $REGISTRY/app:$GITHUB_SHA -t $REGISTRY/app:latest .
          docker push $REGISTRY/app:$GITHUB_SHA
          docker push $REGISTRY/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update $SERVICE \
            --project=$PROJECT_ID \
            --region=$REGION \
            --image=$REGISTRY/app:$GITHUB_SHA
