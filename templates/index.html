<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Euler Solver Benchmark</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
::-webkit-scrollbar{width:6px;background:#161b22}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

.header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:1.3rem;font-weight:700}.header .sub{font-size:.82rem;color:#8b949e;margin-left:auto}
.tabs{display:flex;gap:2px;padding:0 24px;background:#161b22;border-bottom:1px solid #30363d}
.tab{padding:11px 18px;cursor:pointer;color:#8b949e;font-size:.88rem;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:#e6edf3}.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.pane{display:none;padding:20px 24px;max-width:1000px;margin:0 auto}.pane.active{display:block}

.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px;margin-bottom:14px}
.card h3{font-size:.78rem;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
label{display:block;font-size:.83rem;color:#8b949e;margin-bottom:5px}
input,select{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 11px;color:#e6edf3;font-size:.88rem;outline:none}
input:focus,select:focus{border-color:#58a6ff}

.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-top:8px}
.mc{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #30363d;border-radius:7px;cursor:pointer;transition:all .15s;background:#0d1117}
.mc:hover{border-color:#58a6ff;background:#161b22}
.mc.on{border-color:var(--c);background:#161b22}
.mc.off{opacity:.35;cursor:not-allowed}
.mc input[type=checkbox]{accent-color:var(--c);width:13px;height:13px;flex-shrink:0}
.mc .dot{width:7px;height:7px;border-radius:50%;background:var(--c);flex-shrink:0}
.mc .lbl{font-size:.8rem;color:#e6edf3;flex:1}
.mc .prov{font-size:.63rem;color:#6e7681}

.btn{padding:9px 20px;border:none;border-radius:7px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
.btn-green:disabled{background:#30363d;color:#8b949e;cursor:not-allowed}
.btn-red{background:#da3633;color:#fff}.btn-red:hover{background:#f85149}
.btn-sm{padding:5px 13px;font-size:.78rem}
.btn-ghost{background:transparent;border:1px solid #30363d;color:#8b949e}.btn-ghost:hover{border-color:#58a6ff;color:#58a6ff}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.mt{margin-top:12px}

/* Results lanes */
.lanes{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:14px}
.lane{background:#161b22;border:1px solid #30363d;border-radius:9px;padding:14px;transition:border-color .3s}
.lane.pass{border-color:#238636}.lane.fail{border-color:#da3633}.lane.running{border-color:#388bfd}
.lane-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.ldot{width:9px;height:9px;border-radius:50%;background:var(--c);flex-shrink:0}
.lname{font-weight:600;font-size:.87rem;flex:1}
.lstatus{font-size:.72rem;padding:2px 7px;border-radius:12px;background:#21262d;color:#8b949e}
.lstatus.pass{background:#1a3a1f;color:#3fb950}.lstatus.fail{background:#3a1a1a;color:#f85149}
.lstatus.running{background:#1a2a3a;color:#58a6ff}
.lane-row{display:flex;justify-content:space-between;font-size:.82rem;color:#8b949e;margin-top:5px}
.lane-row .val{color:#e6edf3;font-weight:600}
.lane-answer{font-size:1.1rem;font-weight:700;margin-top:6px}
.lane-answer.pass{color:#3fb950}.lane-answer.fail{color:#f85149}

/* Leaderboard */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:9px 12px;color:#8b949e;font-weight:500;font-size:.76rem;border-bottom:1px solid #30363d;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-bottom:1px solid #21262d}
tr:last-child td{border-bottom:none}tr:hover td{background:#21262d}
.rk{font-weight:700;color:#8b949e;width:30px}.rk1{color:#ffd700}.rk2{color:#c0c0c0}.rk3{color:#cd7f32}
.acc{font-weight:700;font-size:.95rem}
.wbar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:5px;background:#238636}

/* Settings */
.krow{display:grid;grid-template-columns:160px 1fr auto;align-items:center;gap:9px;margin-bottom:10px}
.krow label{margin:0;color:#c9d1d9;font-size:.86rem}
.kstat{font-size:.72rem;padding:2px 8px;border-radius:10px}
.kstat.ok{background:#1a3a1f;color:#3fb950}.kstat.no{background:#3a1a1a;color:#f85149}
input[type=password]{font-family:monospace;letter-spacing:.08em}
.empty{text-align:center;padding:36px;color:#8b949e;font-size:.88rem}

.prov-colors{--gemini:#4285f4;--openai:#10c87f;--anthropic:#e8937a;--xai:#8b5cf6}
</style>
</head>
<body class="prov-colors">

<div class="header">
  <h1>Euler Solver</h1>
  <span class="sub">Agentic LLM benchmark on Project Euler problems</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('solve')">Solve</div>
  <div class="tab" onclick="showTab('leaderboard')">Leaderboard</div>
  <div class="tab" onclick="showTab('settings')">Settings</div>
</div>

<!-- SOLVE -->
<div id="pane-solve" class="pane active">
  <div class="card">
    <h3>Problem</h3>
    <div class="flex">
      <div style="flex:1">
        <label>Problem number (1-900+)</label>
        <input type="number" id="problemNum" value="1" min="1" max="999" style="max-width:120px">
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Models</h3>
    <div class="model-grid" id="modelGrid"></div>
  </div>

  <div class="flex mt">
    <button class="btn btn-green" id="runBtn" onclick="startRun()">Solve</button>
    <span id="runStatus" style="font-size:.82rem;color:#8b949e"></span>
  </div>

  <div id="resultsArea"></div>
</div>

<!-- LEADERBOARD -->
<div id="pane-leaderboard" class="pane">
  <div class="card">
    <div class="flex" style="justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">Leaderboard</h3>
      <button class="btn btn-sm btn-ghost" onclick="clearResults()">Clear all</button>
    </div>
    <div id="lbBody"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="pane-settings" class="pane">
  <div class="card">
    <h3>API Keys</h3>
    <p style="font-size:.82rem;color:#8b949e;margin-bottom:14px">Keys are stored server-side. Enter the key for each provider you want to use.</p>
    <div class="krow">
      <label>Gemini</label>
      <input type="password" id="key-GEMINI_API_KEY" placeholder="AIza...">
      <span class="kstat no" id="stat-GEMINI_API_KEY">not set</span>
    </div>
    <div class="krow">
      <label>OpenAI</label>
      <input type="password" id="key-OPENAI_API_KEY" placeholder="sk-...">
      <span class="kstat no" id="stat-OPENAI_API_KEY">not set</span>
    </div>
    <div class="krow">
      <label>Anthropic</label>
      <input type="password" id="key-ANTHROPIC_API_KEY" placeholder="sk-ant-...">
      <span class="kstat no" id="stat-ANTHROPIC_API_KEY">not set</span>
    </div>
    <div class="krow">
      <label>xAI (Grok)</label>
      <input type="password" id="key-XAI_API_KEY" placeholder="xai-...">
      <span class="kstat no" id="stat-XAI_API_KEY">not set</span>
    </div>
    <button class="btn btn-green btn-sm mt" onclick="saveKeys()">Save Keys</button>
  </div>
</div>

<script>
const PROV_COLORS = {gemini:'#4285f4',openai:'#10c87f',anthropic:'#e8937a',xai:'#8b5cf6'};
let models = [];
let selectedModels = new Set();
let pollTimer = null;

function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', t.textContent.trim().toLowerCase()===id));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id==='pane-'+id));
  if (id==='leaderboard') loadLeaderboard();
  if (id==='settings') loadKeys();
}

// ── Models ──
async function loadModels() {
  const r = await fetch('/api/models');
  models = await r.json();
  const grid = document.getElementById('modelGrid');
  grid.innerHTML = '';
  models.forEach(m => {
    const c = PROV_COLORS[m.provider]||'#8b949e';
    const off = !m.available;
    const div = document.createElement('div');
    div.className = `mc${off?' off':''}`;
    div.style.setProperty('--c', c);
    div.innerHTML = `<input type="checkbox" ${off?'disabled':''} data-id="${m.id}"><div class="dot"></div><div><div class="lbl">${m.id}</div><div class="prov">${m.provider}</div></div>`;
    if (!off) {
      div.onclick = () => {
        const cb = div.querySelector('input');
        cb.checked = !cb.checked;
        div.classList.toggle('on', cb.checked);
        if (cb.checked) selectedModels.add(m.id); else selectedModels.delete(m.id);
      };
    }
    grid.appendChild(div);
  });
}

// ── Run ──
async function startRun() {
  const pn = parseInt(document.getElementById('problemNum').value);
  if (!pn || selectedModels.size===0) return;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('runStatus').textContent = 'Starting...';
  document.getElementById('resultsArea').innerHTML = '';

  const r = await fetch('/api/run', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({problem: pn, models: [...selectedModels]})
  });
  const data = await r.json();
  if (data.error) {
    document.getElementById('runStatus').textContent = data.error;
    document.getElementById('runBtn').disabled = false;
    return;
  }
  pollStatus(data.run_id, pn);
}

function pollStatus(runId, pn) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const r = await fetch(`/api/status/${runId}`);
    const data = await r.json();
    renderResults(data, pn);
    const allDone = Object.values(data.model_results).every(m => m.status!=='pending' && m.status!=='running');
    if (allDone) {
      clearInterval(pollTimer);
      document.getElementById('runBtn').disabled = false;
      document.getElementById('runStatus').textContent = 'Done';
    }
  }, 1500);
}

function renderResults(data, pn) {
  const area = document.getElementById('resultsArea');
  const exp = data.expected;
  let html = `<div style="margin-top:14px;font-size:.9rem;color:#8b949e">Problem ${pn}${exp?' — expected: <b style="color:#e6edf3">'+exp+'</b>':''}</div><div class="lanes">`;
  for (const [mid, m] of Object.entries(data.model_results)) {
    const prov = (models.find(x=>x.id===mid)||{}).provider||'';
    const c = PROV_COLORS[prov]||'#8b949e';
    const cls = m.status==='done'?(m.correct?'pass':'fail'):m.status==='running'?'running':'';
    const stCls = m.correct?'pass':m.correct===false?'fail':m.status==='running'?'running':'';
    const stTxt = m.status==='done'?(m.correct?'PASS':'FAIL'):m.status==='running'?'running':m.status==='error'?'error':'pending';
    html += `<div class="lane ${cls}" style="--c:${c}">
      <div class="lane-hd"><div class="ldot"></div><div class="lname">${mid}</div><span class="lstatus ${stCls}">${stTxt}</span></div>`;
    if (m.answer) html += `<div class="lane-answer ${m.correct?'pass':'fail'}">${m.answer}</div>`;
    if (m.error) html += `<div style="color:#f85149;font-size:.82rem;margin-top:4px">${m.error}</div>`;
    if (m.status==='done' || m.status==='running') {
      html += `<div class="lane-row"><span>Steps</span><span class="val">${m.steps}</span></div>`;
      html += `<div class="lane-row"><span>Time</span><span class="val">${m.time_s}s</span></div>`;
      if (m.cost) html += `<div class="lane-row"><span>Cost</span><span class="val">$${m.cost.toFixed(4)}</span></div>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  area.innerHTML = html;
  document.getElementById('runStatus').textContent = 'Running...';
}

// ── Leaderboard ──
async function loadLeaderboard() {
  const r = await fetch('/api/leaderboard');
  const rows = await r.json();
  const body = document.getElementById('lbBody');
  if (!rows.length) { body.innerHTML = '<div class="empty">No results yet. Run some problems first.</div>'; return; }
  let html = '<table><thead><tr><th>#</th><th>Model</th><th>Runs</th><th>Accuracy</th><th>Avg Steps</th><th>Avg Time</th><th>Avg Cost</th></tr></thead><tbody>';
  rows.forEach((r,i) => {
    const rkCls = i<3?` rk${i+1}`:'';
    const barW = Math.round(r.accuracy);
    html += `<tr><td class="rk${rkCls}">${i+1}</td><td><b>${r.model_id}</b></td><td>${r.runs}</td>`;
    html += `<td><span class="acc">${r.accuracy}%</span><span class="wbar" style="width:${barW}px"></span></td>`;
    html += `<td>${r.avg_steps}</td><td>${r.avg_time}s</td><td>$${r.avg_cost.toFixed(4)}</td></tr>`;
  });
  html += '</tbody></table>';
  body.innerHTML = html;
}

// ── Settings ──
async function loadKeys() {
  const r = await fetch('/api/config');
  const data = await r.json();
  for (const [key, has] of Object.entries(data.has_key||{})) {
    const stat = document.getElementById('stat-'+key);
    if (stat) {
      stat.className = has?'kstat ok':'kstat no';
      stat.textContent = has?(data.masked[key]||'set'):'not set';
    }
  }
}

async function saveKeys() {
  const payload = {};
  for (const key of ['GEMINI_API_KEY','OPENAI_API_KEY','ANTHROPIC_API_KEY','XAI_API_KEY']) {
    const input = document.getElementById('key-'+key);
    if (input.value.trim()) payload[key] = input.value.trim();
  }
  await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  for (const input of document.querySelectorAll('#pane-settings input')) input.value = '';
  await loadKeys();
  await loadModels();
}

async function clearResults() {
  if (!confirm('Clear all results?')) return;
  await fetch('/api/clear_results', {method:'POST'});
  loadLeaderboard();
}

// ── Boot ──
loadModels();
</script>
</body>
</html>
